spring.application.name=ai-resume-analyzer

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/resume_analyzer
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA schema managed by Flyway, Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true

# OpenAI
ai.openai.base-url=https://api.openai.com/v1
ai.openai.api-key=${OPENAI_API_KEY}
ai.openai.timeout-seconds=30

# Server
server.port=8080


